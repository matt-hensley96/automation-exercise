name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Debug

      - name: Install Playwright browsers
        run: pwsh src/AutomationExercise.Tests/bin/Debug/net8.0/playwright.ps1 install --with-deps chromium

      - name: Run tests
        run: dotnet test --no-build --configuration Debug
        env:
          GH_ISSUE_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test report and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: src/AutomationExercise.Tests/bin/Debug/net8.0/TestResults
          if-no-files-found: warn
